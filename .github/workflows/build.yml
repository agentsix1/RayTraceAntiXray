name: Build RayTraceAntiXray

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build with Maven
        run: ./mvnw clean package -B

      # Find all jars inside the repo
      - name: Find all JARs
        run: |
          echo "Listing all JARs inside repo:"
          find . -name "*.jar"

      # Upload any JARs found
      - name: Upload plugin JARs
        uses: actions/upload-artifact@v4
        with:
          name: RayTraceAntiXray
          path: '**/*.jar'
          if-no-files-found: error
