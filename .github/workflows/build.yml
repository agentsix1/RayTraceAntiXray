name: Build RayTraceAntiXray

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout the repo
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2️⃣ Setup Java 21
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      # 3️⃣ Build using Maven
      - name: Build with Maven
        run: ./mvnw clean package -B

      # 4️⃣ Debug: list all target folders
      - name: List all target folders
        run: |
          echo "Root target folder:"
          ls -l target/
          echo "Libs target folder:"
          ls -l Libs/target/
          echo "RayTraceAntiXray target folder:"
          ls -l RayTraceAntiXray/target/

      # 5️⃣ Upload the plugin JAR from the correct module
      - name: Upload plugin JAR
        uses: actions/upload-artifact@v4
        with:
          name: RayTraceAntiXray
          path: RayTraceAntiXray/target/*.jar
          if-no-files-found: error
