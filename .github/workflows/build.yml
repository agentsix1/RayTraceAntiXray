name: Build RayTraceAntiXray

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build with Maven
        run: ./mvnw -B package

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: RayTraceAntiXray
          path: target/*.jar
          if-no-files-found: error   # fail if nothing found
